<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy birthday ya habibi ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        /* --- The Cake --- */
        .cake {
            position: relative;
            width: 250px;
            height: 150px;
            margin: 0 auto;
        }

        .plate {
            width: 270px;
            height: 10px;
            background: #ddd;
            border-radius: 10px;
            position: absolute;
            bottom: -10px;
            left: -10px;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 60px;
            background: #f8a5c2;
            border-radius: 10px 10px 0 0;
        }

        .layer-bottom {
            bottom: 0;
            background: #f78fb3;
        }

        .layer-top {
            bottom: 60px;
            background: #f78fb3;
            height: 50px;
            width: 90%;
            left: 5%;
            background: #fff;
            border-radius: 10px 10px 0 0;
            box-shadow: inset 0 -10px 0 rgba(0,0,0,0.1);
        }

        .frosting {
            position: absolute;
            top: 0;
            width: 100%;
            height: 20px;
            background: #ff7675;
            border-radius: 10px 10px 0 0;
            z-index: 2;
        }

        /* --- The Candles --- */
        .candle {
            position: absolute;
            width: 10px;
            height: 40px;
            background: repeating-linear-gradient(45deg, #74b9ff, #74b9ff 5px, #fff 5px, #fff 10px);
            bottom: 110px;
            z-index: 3;
        }

        .candle-left { left: 80px; }
        .candle-right { right: 80px; }

        .flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 18px;
            background: #ffeaa7;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px #fdcb6e;
            animation: flicker 1s infinite alternate;
            transition: opacity 0.5s;
        }

        .flame.out {
            opacity: 0;
            transform: translateX(-50%) scale(0.5);
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 1; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 0.9; }
        }

        /* --- The Microphone --- */
        .mic-btn {
            margin-top: 50px;
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
            transition: transform 0.2s;
            font-family: 'Cairo', sans-serif;
        }

        .mic-btn:active {
            transform: scale(0.95);
        }

        /* --- The Gift Box --- */
        .gift-box {
            position: absolute;
            top: -100px; /* Hidden initially */
            left: 50%;
            transform: translateX(-50%);
            font-size: 80px;
            cursor: pointer;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            animation: bounce 2s infinite;
        }

        .gift-box.show {
            top: -120px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-20px);}
            60% {transform: translateX(-50%) translateY(-10px);}
        }

        /* --- Text --- */
        h1 {
            color: #d63031;
            margin-bottom: 20px;
        }
        
        .hidden { display: none; }

    </style>
</head>
<body>

    <div class="container">
        <!-- Gift Box (Hidden initially) -->
        <div class="gift-box" id="giftBox" onclick="playAudio()">🎁</div>

        <!-- The Cake -->
        <div class="cake">
            <div class="plate"></div>
            <div class="layer layer-bottom"></div>
            <div class="layer layer-top">
                <div class="frosting"></div>
            </div>
            
            <!-- Candles -->
            <div class="candle candle-left">
                <div class="flame" id="flame1"></div>
            </div>
            <div class="candle candle-right">
                <div class="flame" id="flame2"></div>
            </div>
        </div>

        <h1>🎂 22 🎂</h1>

        <!-- Microphone Button -->
        <button class="mic-btn" onclick="blowCandles()">
            🎙️Blow the candle 
        </button>
    </div>

    <!-- Audio Element (Replace 'voice.mp3' with your file) -->
    <audio id="birthdayAudio" src="voice.mp3"></audio>

    <script>
        function blowCandles() {
            const flames = document.querySelectorAll('.flame');
            const giftBox = document.getElementById('giftBox');
            const micBtn = document.querySelector('.mic-btn');

            // 1. Turn off flames
            flames.forEach(flame => {
                flame.classList.add('out');
            });

            // 2. Hide button and show gift after a short delay
            setTimeout(() => {
                micBtn.style.display = 'none';
                giftBox.classList.add('show');
            }, 1000);
        }

        function playAudio() {
            const audio = document.getElementById('birthdayAudio');
            const giftBox = document.getElementById('giftBox');
            
            // Play the audio
            audio.play().catch(error => {
                console.log("Audio play failed (user interaction needed):", error);
            });

            // Optional: Confetti effect or text change
            giftBox.innerHTML = "🎉"; // Change icon to celebration
            giftBox.style.animation = "none";
            
            // You can add more logic here, like showing a message
            // alert("Happy Birthday!"); 
        }
    </script>
</body>
</html>
