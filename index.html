<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Habibi!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: #ff4d4d;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Cake and Candle Styling */
        #cake-container {
            position: relative;
            font-size: 150px;
            line-height: 1;
        }

        #candle {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            font-weight: bold;
            color: #ff9900;
            text-shadow: 0 0 10px #ffcc00;
            transition: all 0.5s ease;
        }

        /* Interactive Buttons */
        button {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #ff3333;
        }

        /* Surprise Elements */
        #gift-btn {
            display: none;
            font-size: 2rem;
            background-color: #4CAF50;
        }

        #surprise-container {
            display: none;
            margin-top: 30px;
            animation: fadeIn 1.5s;
        }

        #surprise-pic {
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border: 5px solid white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #status-text {
            color: #666;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Happy birthday habibi ❤️</h1>

    <div id="cake-container">
        <div id="candle">22 🕯️</div>
        🎂
    </div>

    <p id="status-text">Click the button below to light the candles, then blow into your microphone!</p>
    
    <button id="start-mic-btn">Light the Candles</button>
    <button id="gift-btn">🎁 Open Your Gift!</button>

    <div id="surprise-container">
        <img id="surprise-pic" src="your-picture.jpg" alt="Surprise Photo">
        
        <audio id="voice-audio" src="your-voice-note.mp3"></audio>
    </div>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let animationId;

        const startBtn = document.getElementById('start-mic-btn');
        const giftBtn = document.getElementById('gift-btn');
        const candle = document.getElementById('candle');
        const statusText = document.getElementById('status-text');
        const surpriseContainer = document.getElementById('surprise-container');
        const voiceAudio = document.getElementById('voice-audio');

        // 1. Start Microphone
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                microphone.connect(analyser);
                analyser.fftSize = 256;
                
                startBtn.style.display = 'none';
                statusText.innerText = "Listening... Blow into the microphone!";
                
                listenForBlow();
            } catch (err) {
                alert("Please allow microphone access so you can blow out the candles!");
                console.error(err);
            }
        });

        // 2. Detect Blowing (Loud noise)
        function listenForBlow() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            let averageVolume = sum / bufferLength;

            // If the volume spikes over a certain threshold, consider it "blown"
            if (averageVolume > 60) {
                blowOutCandles();
            } else {
                animationId = requestAnimationFrame(listenForBlow);
            }
        }

        // 3. Candles Blow Out
        function blowOutCandles() {
            cancelAnimationFrame(animationId); // Stop listening
            if(audioContext) audioContext.close(); // Turn off mic

            candle.innerHTML = "22 💨"; // Change to smoke emoji
            candle.style.color = "gray";
            candle.style.textShadow = "none";
            
            statusText.style.display = 'none';
            giftBtn.style.display = 'inline-block'; // Show the gift button
        }

        // 4. Click Gift to Reveal
        giftBtn.addEventListener('click', () => {
            giftBtn.style.display = 'none';
            surpriseContainer.style.display = 'block';
            voiceAudio.play(); // Play your voice note
        });
    </script>
</body>
</html>
