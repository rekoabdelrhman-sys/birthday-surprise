<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Habibi!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: #ff4d4d;
            font-size: 3rem;
            margin-bottom: 60px; /* Space for the candles */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* --- Custom Rounded Cake CSS --- */
        #cake {
            position: relative;
            width: 250px;
            height: 120px;
            background-color: #ff9999;
            border-radius: 20px; /* Makes the cake rounded */
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        /* Frosting on top */
        #frosting {
            position: absolute;
            top: -15px;
            left: 0;
            width: 100%;
            height: 40px;
            background-color: #fff;
            border-radius: 20px 20px 50px 50px; /* Rounded drips */
            box-shadow: 0 5px 5px rgba(0,0,0,0.05);
        }

        /* 22 Candles */
        .candles {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .candle {
            position: relative;
            width: 25px;
            height: 60px;
            background: repeating-linear-gradient(
                45deg,
                #fff,
                #fff 10px,
                #ff4d4d 10px,
                #ff4d4d 20px
            );
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            background-color: white;
            border: 2px solid #fff;
        }

        .flame {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 26px;
            background-color: #ffcc00;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px #ff9900, 0 0 30px #ffcc00;
            animation: flicker 0.1s infinite alternate;
            transition: opacity 0.3s ease;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 1; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 0.9; }
        }

        /* --- Interactive Elements --- */
        button {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #ff3333;
        }

        #gift-btn {
            display: none;
            font-size: 2rem;
            background-color: #4CAF50;
            margin-top: 20px;
        }

        #surprise-container {
            display: none;
            margin-top: 30px;
            animation: fadeIn 1.5s;
        }

        #surprise-pic {
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border: 5px solid white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #status-text {
            color: #666;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Happy birthday habibi ❤️</h1>

    <div id="cake">
        <div class="candles">
            <div class="candle">
                <div class="flame" id="flame1"></div>
                2
            </div>
            <div class="candle">
                <div class="flame" id="flame2"></div>
                2
            </div>
        </div>
        <div id="frosting"></div>
    </div>

    <p id="status-text">Click the button below to allow the microphone, then blow out the candles!</p>
    
    <button id="start-mic-btn">Turn on Microphone</button>
    <button id="gift-btn">🎁 Open Your Gift!</button>

    <div id="surprise-container">
        <img id="surprise-pic" src="your-picture.jpg" alt="Surprise Photo">
        
        <audio id="voice-audio" src="your-voice-note.mp3"></audio>
    </div>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let animationId;

        const startBtn = document.getElementById('start-mic-btn');
        const giftBtn = document.getElementById('gift-btn');
        const flames = document.querySelectorAll('.flame');
        const statusText = document.getElementById('status-text');
        const surpriseContainer = document.getElementById('surprise-container');
        const voiceAudio = document.getElementById('voice-audio');

        // 1. Start Microphone
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                microphone.connect(analyser);
                analyser.fftSize = 256;
                
                startBtn.style.display = 'none';
                statusText.innerText = "Listening... Blow into the microphone!";
                
                listenForBlow();
            } catch (err) {
                alert("Please allow microphone access so you can blow out the candles!");
                console.error(err);
            }
        });

        // 2. Detect Blowing (Loud noise)
        function listenForBlow() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            let averageVolume = sum / bufferLength;

            // Threshold for blowing (adjust if it's too hard/easy to trigger)
            if (averageVolume > 60) {
                blowOutCandles();
            } else {
                animationId = requestAnimationFrame(listenForBlow);
            }
        }

        // 3. Candles Blow Out
        function blowOutCandles() {
            cancelAnimationFrame(animationId); 
            if(audioContext) audioContext.close(); 

            // Hide the flames
            flames.forEach(flame => {
                flame.style.display = 'none';
            });
            
            statusText.style.display = 'none';
            giftBtn.style.display = 'inline-block'; // Show the gift button
        }

        // 4. Click Gift to Reveal
        giftBtn.addEventListener('click', () => {
            giftBtn.style.display = 'none';
            surpriseContainer.style.display = 'block';
            voiceAudio.play(); // Play your voice note
        });
    </script>
</body>
</html>
