<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ya Habibi!</title>
    <style>
        body {
            /* Gradient background from your image */
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            font-family: 'Arial Black', Impact, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            padding-top: 50px;
        }

        /* Bubbly Text Styling */
        h1 {
            color: white;
            font-size: 4rem;
            margin: 0 20px 60px 20px;
            letter-spacing: 2px;
            /* Creates the thick purple outline and shadow */
            text-shadow: 
                -3px -3px 0 #8a2be2, 3px -3px 0 #8a2be2, 
                -3px 3px 0 #8a2be2, 3px 3px 0 #8a2be2,
                6px 6px 0px #5e1b99;
            line-height: 1.2;
            z-index: 10;
        }

        /* --- 3-Tier Chocolate Cake --- */
        #cake-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        /* Base styles for all tiers to make them 3D cylinders */
        .tier {
            position: relative;
            background-color: #4a2e1b; /* Top surface color */
            border-radius: 50%;
            /* The shadow creates the vertical walls of the cake */
            box-shadow: 0 40px 0 #362214, inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* Drip effect container */
        .tier::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 5%;
            width: 90%;
            height: 40px;
            background-image: radial-gradient(circle at 10px 10px, #4a2e1b 12px, transparent 13px);
            background-size: 25px 40px;
            background-repeat: repeat-x;
            z-index: 2;
        }

        /* Individual Tiers (Stacked from top to bottom) */
        .tier-top {
            width: 140px;
            height: 60px;
            z-index: 3;
            margin-bottom: 20px; /* Space for the shadow */
        }
        
        .tier-middle {
            width: 220px;
            height: 80px;
            z-index: 2;
            margin-top: -30px; /* Overlaps with tier above */
            box-shadow: 0 50px 0 #362214, inset 0 0 30px rgba(0,0,0,0.6);
        }
        
        .tier-bottom {
            width: 300px;
            height: 100px;
            z-index: 1;
            margin-top: -30px; /* Overlaps with tier above */
            box-shadow: 0 60px 0 #362214, inset 0 0 40px rgba(0,0,0,0.7);
        }

        /* --- Candles (22) --- */
        .candles {
            position: absolute;
            top: -65px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            z-index: 10;
        }

        .candle {
            position: relative;
            font-size: 60px;
            color: #9b59b6; /* Purple candles */
            text-shadow: 2px 2px 0px #5e1b99;
            font-family: 'Arial Black', sans-serif;
        }

        .flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 20px;
            background-color: #ffcc00;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px #ff9900, 0 0 20px #ffcc00;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 1; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 0.8; }
        }

        /* --- Sparklers --- */
        .sparkler {
            position: absolute;
            font-size: 40px;
            animation: pulse 0.5s infinite alternate;
            z-index: 0;
        }
        #s1 { top: 50px; left: -100px; }
        #s2 { top: 120px; right: -80px; }
        #s3 { top: 180px; left: -120px; }
        #s4 { top: 20px; right: -100px; }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.7; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* --- Interactive Elements --- */
        #controls {
            margin-top: 100px; /* Push down past the 3D cake shadow */
            z-index: 10;
        }

        button {
            background-color: #8a2be2;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        button:hover {
            background-color: #5e1b99;
        }

        #gift-btn {
            display: none;
            background-color: #4CAF50;
            font-size: 1.5rem;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        #surprise-container {
            display: none;
            margin-top: 30px;
            z-index: 10;
        }

        #surprise-pic {
            max-width: 300px;
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        #status-text {
            color: #333;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>Happy birthday<br>ya habibi</h1>

    <div id="cake-wrapper">
        <div class="sparkler" id="s1">🎇</div>
        <div class="sparkler" id="s2">🎇</div>
        <div class="sparkler" id="s3">🎇</div>
        <div class="sparkler" id="s4">🎇</div>

        <div class="candles">
            <div class="candle">
                <div class="flame"></div>2
            </div>
            <div class="candle">
                <div class="flame"></div>2
            </div>
        </div>

        <div class="tier tier-top"></div>
        <div class="tier tier-middle"></div>
        <div class="tier tier-bottom"></div>
    </div>

    <div id="controls">
        <p id="status-text">Click below to allow the mic, then blow out the candles!</p>
        <button id="start-mic-btn">Turn on Microphone 🎤</button>
        <button id="gift-btn">🎁 Open Your Gift!</button>
    </div>

    <div id="surprise-container">
        <img id="surprise-pic" src="your-picture.jpg" alt="Surprise Photo">
        <audio id="voice-audio" src="your-voice-note.mp3"></audio>
    </div>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let animationId;

        const startBtn = document.getElementById('start-mic-btn');
        const giftBtn = document.getElementById('gift-btn');
        const flames = document.querySelectorAll('.flame');
        const sparklers = document.querySelectorAll('.sparkler');
        const statusText = document.getElementById('status-text');
        const surpriseContainer = document.getElementById('surprise-container');
        const voiceAudio = document.getElementById('voice-audio');

        // Start Mic
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                microphone.connect(analyser);
                analyser.fftSize = 256;
                
                startBtn.style.display = 'none';
                statusText.innerText = "Listening... Blow into the microphone! 💨";
                
                listenForBlow();
            } catch (err) {
                alert("Please allow microphone access to blow out the candles!");
            }
        });

        // Detect Blowing
        function listenForBlow() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            let averageVolume = sum / bufferLength;

            // Trigger blow out
            if (averageVolume > 60) {
                blowOutCandles();
            } else {
                animationId = requestAnimationFrame(listenForBlow);
            }
        }

        // Blow out action
        function blowOutCandles() {
            cancelAnimationFrame(animationId); 
            if(audioContext) audioContext.close(); 

            // Hide flames and stop sparklers
            flames.forEach(flame => flame.style.display = 'none');
            sparklers.forEach(sparkler => sparkler.style.display = 'none');
            
            statusText.style.display = 'none';
            giftBtn.style.display = 'inline-block'; 
        }

        // Open Gift
        giftBtn.addEventListener('click', () => {
            giftBtn.style.display = 'none';
            document.getElementById('cake-wrapper').style.display = 'none'; // Optional: hides cake to focus on gift
            surpriseContainer.style.display = 'block';
            voiceAudio.play();
        });
    </script>
</body>
</html>
