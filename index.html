<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ya Habibi!</title>
    <style>
        body {
            /* Beautiful Blue Background */
            background: linear-gradient(135deg, #a1c4fd 0%, #8fd3f4 100%);
            font-family: 'Arial Black', Impact, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            padding-top: 40px;
        }

        h1 {
            color: #d896ff; /* Purple */
            font-size: 3.5rem;
            margin: 0 20px 40px 20px;
            letter-spacing: 2px;
            text-shadow: 
                -2px -2px 0 #fff, 2px -2px 0 #fff, 
                -2px 2px 0 #fff, 2px 2px 0 #fff,
                4px 4px 0px #5e1b99;
            line-height: 1.2;
            z-index: 10;
        }

        /* --- Pure 2D CSS Cake --- */
        #cake-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        /* Candles */
        .candles {
            display: flex;
            gap: 15px;
            margin-bottom: -5px; /* Pulls candles down into the cake slightly */
            z-index: 5;
        }

        .candle {
            position: relative;
            width: 30px;
            height: 70px;
            background-color: #9b59b6; /* Purple candle */
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            border: 2px solid #5e1b99;
            box-shadow: inset -3px 0 0 rgba(0,0,0,0.2);
        }

        .flame {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 26px;
            background-color: #ffcc00;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px #ff9900, 0 0 25px #ffcc00;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 1; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 0.8; }
        }

        /* Cake Tiers */
        .tier {
            background-color: #5D4037; /* Chocolate color */
            border-radius: 10px 10px 0 0;
            position: relative;
            box-shadow: inset -10px 0 0 rgba(0,0,0,0.2); /* 2D shading */
        }

        .frosting {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 25px;
            background-color: #795548; /* Lighter chocolate frosting */
            border-radius: 10px 10px 20px 20px;
        }

        .tier-top {
            width: 150px;
            height: 60px;
            z-index: 3;
        }

        .tier-bottom {
            width: 220px;
            height: 80px;
            z-index: 2;
            border-radius: 0 0 10px 10px;
        }

        .plate {
            width: 280px;
            height: 15px;
            background-color: #ecf0f1; /* White plate */
            border-radius: 50px;
            z-index: 1;
            margin-top: 5px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
        }

        /* --- Interactive Elements --- */
        #controls {
            margin-top: 40px;
            z-index: 10;
        }

        button {
            background-color: #5e1b99;
            color: white;
            border: 2px solid #fff;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #8a2be2;
        }

        #gift-btn {
            display: none;
            background-color: #4CAF50;
            font-size: 1.5rem;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        #surprise-container {
            display: none;
            margin-top: 20px;
            padding-bottom: 50px;
        }

        #surprise-pic {
            max-width: 300px;
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        #status-text {
            color: #003366;
            font-weight: bold;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <h1>Happy birthday<br>ya habibi</h1>

    <div id="cake-container">
        <div class="candles">
            <div class="candle">
                <div class="flame"></div>
                2
            </div>
            <div class="candle">
                <div class="flame"></div>
                2
            </div>
        </div>
        <div class="tier tier-top">
            <div class="frosting"></div>
        </div>
        <div class="tier tier-bottom">
            <div class="frosting"></div>
        </div>
        <div class="plate"></div>
    </div>

    <div id="controls">
        <p id="status-text">Click below to allow the mic, then blow out the candles!</p>
        <button id="start-mic-btn">Turn on Microphone 🎤</button>
        <button id="gift-btn">🎁 Open Your Gift!</button>
    </div>

    <div id="surprise-container">
        <img id="surprise-pic" src="your-picture.jpg" alt="Surprise Photo">
        <audio id="voice-audio" src="your-voice-note.mp3"></audio>
    </div>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let animationId;

        const startBtn = document.getElementById('start-mic-btn');
        const giftBtn = document.getElementById('gift-btn');
        const flames = document.querySelectorAll('.flame');
        const statusText = document.getElementById('status-text');
        const surpriseContainer = document.getElementById('surprise-container');
        const voiceAudio = document.getElementById('voice-audio');
        const cakeContainer = document.getElementById('cake-container');

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                microphone.connect(analyser);
                analyser.fftSize = 256;
                
                startBtn.style.display = 'none';
                statusText.innerText = "Listening... Blow into the microphone! 💨";
                
                listenForBlow();
            } catch (err) {
                alert("Please allow microphone access to blow out the candles!");
            }
        });

        function listenForBlow() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            let averageVolume = sum / bufferLength;

            // Blow threshold
            if (averageVolume > 50) { 
                blowOutCandles();
            } else {
                animationId = requestAnimationFrame(listenForBlow);
            }
        }

        function blowOutCandles() {
            cancelAnimationFrame(animationId); 
            if(audioContext) audioContext.close(); 

            // Hide the glowing flames
            flames.forEach(flame => flame.style.display = 'none');
            
            statusText.style.display = 'none';
            giftBtn.style.display = 'inline-block'; 
        }

        giftBtn.addEventListener('click', () => {
            giftBtn.style.display = 'none';
            cakeContainer.style.display = 'none'; // Hides cake to show picture
            surpriseContainer.style.display = 'block';
            voiceAudio.play();
        });
    </script>
</body>
</html>
