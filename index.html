<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ya Habibi!</title>
    <style>
        body {
            /* Beautiful Blue Background */
            background: linear-gradient(135deg, #a1c4fd 0%, #8fd3f4 100%);
            font-family: 'Arial Black', Impact, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            padding-top: 40px;
        }

        /* Bubbly Text Styling - Purple with White/Dark outline */
        h1 {
            color: #d896ff;
            font-size: 3.5rem;
            margin: 0 20px 40px 20px;
            letter-spacing: 2px;
            text-shadow: 
                -2px -2px 0 #fff, 2px -2px 0 #fff, 
                -2px 2px 0 #fff, 2px 2px 0 #fff,
                4px 4px 0px #5e1b99;
            line-height: 1.2;
            z-index: 10;
        }

        /* --- 3-Tier Chocolate Cake --- */
        #cake-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }

        /* Cake Cylinders */
        .tier {
            position: relative;
            background-color: #5D4037; /* Lighter chocolate top surface */
            border-radius: 50%;
        }

        /* Chocolate Drips */
        .tier::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -2%;
            width: 104%;
            height: 30px;
            background-image: radial-gradient(circle at 15px 10px, #5D4037 15px, transparent 16px);
            background-size: 30px 40px;
            background-repeat: repeat-x;
            z-index: 2;
        }

        /* Sizing the 3 Tiers */
        .tier-top {
            width: 120px;
            height: 40px;
            z-index: 3;
            box-shadow: 0 40px 0 #3E2723, inset 0 0 15px rgba(0,0,0,0.4); /* Dark chocolate sides */
            margin-bottom: 40px; /* Space for the 3D shadow */
        }
        
        .tier-middle {
            width: 200px;
            height: 50px;
            z-index: 2;
            box-shadow: 0 50px 0 #3E2723, inset 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 50px;
        }
        
        .tier-bottom {
            width: 280px;
            height: 60px;
            z-index: 1;
            box-shadow: 0 60px 0 #3E2723, inset 0 0 25px rgba(0,0,0,0.6);
            margin-bottom: 60px;
        }

        /* --- Candles (22) --- */
        .candles {
            position: absolute;
            top: -65px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .candle {
            position: relative;
            font-size: 60px;
            color: #9b59b6; /* Purple candles to match the text */
            text-shadow: 2px 2px 0px #5e1b99;
            font-family: 'Arial Black', sans-serif;
        }

        /* Flickering Flames */
        .flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 24px;
            background-color: #ffcc00;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 12px #ff9900, 0 0 24px #ffcc00;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 1; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 0.8; }
        }

        /* --- Sparklers --- */
        .sparkler {
            position: absolute;
            font-size: 45px;
            animation: pulse 0.5s infinite alternate;
            z-index: 0;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.8));
        }
        #s1 { top: 30px; left: -80px; }
        #s2 { top: 100px; right: -70px; }
        #s3 { top: 160px; left: -100px; }
        #s4 { top: 20px; right: -90px; }

        @keyframes pulse {
            0% { transform: scale(0.8) rotate(-5deg); opacity: 0.8; }
            100% { transform: scale(1.1) rotate(5deg); opacity: 1; }
        }

        /* --- Interactive Elements --- */
        #controls {
            margin-top: 30px;
            z-index: 10;
        }

        button {
            background-color: #5e1b99;
            color: white;
            border: 2px solid #fff;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #8a2be2;
        }

        #gift-btn {
            display: none;
            background-color: #4CAF50; /* Green gift button */
            font-size: 1.5rem;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        #surprise-container {
            display: none;
            margin-top: 20px;
            z-index: 10;
            padding-bottom: 50px;
        }

        #surprise-pic {
            max-width: 300px;
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        #status-text {
            color: #003366;
            font-weight: bold;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <h1>Happy birthday<br>ya habibi</h1>

    <div id="cake-wrapper">
        <div class="sparkler" id="s1">🎇</div>
        <div class="sparkler" id="s2">🎇</div>
        <div class="sparkler" id="s3">🎇</div>
        <div class="sparkler" id="s4">🎇</div>

        <div class="candles">
            <div class="candle">
                <div class="flame"></div>2
            </div>
            <div class="candle">
                <div class="flame"></div>2
            </div>
        </div>

        <div class="tier tier-top"></div>
        <div class="tier tier-middle"></div>
        <div class="tier tier-bottom"></div>
    </div>

    <div id="controls">
        <p id="status-text">Click below to allow the mic, then blow out the candles!</p>
        <button id="start-mic-btn">Turn on Microphone 🎤</button>
        <button id="gift-btn">🎁 Open Your Gift!</button>
    </div>

    <div id="surprise-container">
        <img id="surprise-pic" src="your-picture.jpg" alt="Surprise Photo">
        <audio id="voice-audio" src="your-voice-note.mp3"></audio>
    </div>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let animationId;

        const startBtn = document.getElementById('start-mic-btn');
        const giftBtn = document.getElementById('gift-btn');
        const flames = document.querySelectorAll('.flame');
        const sparklers = document.querySelectorAll('.sparkler');
        const statusText = document.getElementById('status-text');
        const surpriseContainer = document.getElementById('surprise-container');
        const voiceAudio = document.getElementById('voice-audio');
        const cakeWrapper = document.getElementById('cake-wrapper');

        // Start Mic
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                microphone.connect(analyser);
                analyser.fftSize = 256;
                
                startBtn.style.display = 'none';
                statusText.innerText = "Listening... Blow into the microphone! 💨";
                
                listenForBlow();
            } catch (err) {
                alert("Please allow microphone access to blow out the candles!");
            }
        });

        // Detect Blowing
        function listenForBlow() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            let averageVolume = sum / bufferLength;

            // Trigger blow out
            if (averageVolume > 50) { // Slightly more sensitive so it's easier to blow out
                blowOutCandles();
            } else {
                animationId = requestAnimationFrame(listenForBlow);
            }
        }

        // Blow out action
        function blowOutCandles() {
            cancelAnimationFrame(animationId); 
            if(audioContext) audioContext.close(); 

            // Hide flames and stop sparklers
            flames.forEach(flame => flame.style.display = 'none');
            sparklers.forEach(sparkler => sparkler.style.display = 'none');
            
            statusText.style.display = 'none';
            giftBtn.style.display = 'inline-block'; 
        }

        // Open Gift
        giftBtn.addEventListener('click', () => {
            giftBtn.style.display = 'none';
            cakeWrapper.style.display = 'none'; // Hides the cake so the focus is on your picture
            surpriseContainer.style.display = 'block';
            voiceAudio.play();
        });
    </script>
</body>
</html>
