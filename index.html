<!DOCTYPE html>
<html>
<head>

<title>Happy 22 Birthday</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#ffe0ec;
}

#cake{
width:420px;
margin-top:40px;
}

#gift{
display:none;
margin-top:30px;
cursor:pointer;
}

#gift img{
width:150px;
}

</style>

</head>

<body>

<h1>Make a wish and blow the candles 🎂</h1>
<p>Blow into your microphone 🕯️</p>

<img id="cake" src="https://i.imgur.com/8Km9tLL.png">

<div id="gift" onclick="playVoice()">

<h2>Your Birthday Gift 🎁</h2>

<img src="https://cdn-icons-png.flaticon.com/512/869/869636.png">

<p>Click the gift</p>

</div>

<audio id="voice">
<source src="voice.mp3" type="audio/mpeg">
</audio>

<script>

navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {

const audioContext = new AudioContext();
const mic = audioContext.createMediaStreamSource(stream);
const analyser = audioContext.createAnalyser();

mic.connect(analyser);

const data = new Uint8Array(analyser.frequencyBinCount);

function detectBlow(){

analyser.getByteFrequencyData(data);

let volume = data.reduce((a,b)=>a+b)/data.length;

if(volume > 60){

document.getElementById("gift").style.display="block";

}

requestAnimationFrame(detectBlow);
}

detectBlow();

});

function playVoice(){

document.getElementById("voice").play();

}

</script>

</body>
</html>
