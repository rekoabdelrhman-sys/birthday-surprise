<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ya Habibi!</title>
    <style>
        body {
            /* The purple/blue gradient from your original photo */
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            font-family: 'Arial Black', Impact, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            padding-top: 30px;
        }

        h1 {
            color: white;
            font-size: 3.5rem;
            margin: 0 20px 20px 20px;
            letter-spacing: 2px;
            text-shadow: 
                -3px -3px 0 #8a2be2, 3px -3px 0 #8a2be2, 
                -3px 3px 0 #8a2be2, 3px 3px 0 #8a2be2,
                6px 6px 0px #5e1b99;
            line-height: 1.2;
            z-index: 10;
        }

        /* --- The Cake Image Wrapper --- */
        #cake-wrapper {
            position: relative;
            margin-top: 20px;
            max-width: 500px; /* Adjust based on your image size */
        }

        #cake-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- Interactive Flames --- */
        /* You may need to change the 'top' and 'left' percentages 
           so these perfectly cover the candles in your specific photo */
        .flame {
            position: absolute;
            width: 15px;
            height: 25px;
            background-color: #ffcc00;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px #ff9900, 0 0 30px #ffcc00;
            animation: flicker 0.1s infinite alternate;
            z-index: 5;
        }

        #flame1 {
            top: 25%;  /* Adjust these to move the left flame up/down */
            left: 46%; /* Adjust these to move the left flame left/right */
        }

        #flame2 {
            top: 25%;  /* Adjust these to move the right flame up/down */
            left: 52%; /* Adjust these to move the right flame left/right */
        }

        @keyframes flicker {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }

        /* --- Interactive Elements --- */
        #controls {
            margin-top: 30px;
            z-index: 10;
        }

        button {
            background-color: #8a2be2;
            color: white;
            border: 2px solid #fff;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            font-weight: bold;
        }

        button:hover {
            background-color: #5e1b99;
        }

        #gift-btn {
            display: none;
            background-color: #4CAF50;
            font-size: 1.5rem;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        #surprise-container {
            display: none;
            margin-top: 20px;
            padding-bottom: 50px;
        }

        #surprise-pic {
            max-width: 300px;
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        #status-text {
            color: #333;
            font-weight: bold;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <h1>Happy birthday<br>ya habibi</h1>

    <div id="cake-wrapper">
        <img src="cake-photo.png" alt="Birthday Cake" id="cake-image">
        
        <div class="flame" id="flame1"></div>
        <div class="flame" id="flame2"></div>
    </div>

    <div id="controls">
        <p id="status-text">Click below to allow the mic, then blow out the candles!</p>
        <button id="start-mic-btn">Turn on Microphone 🎤</button>
        <button id="gift-btn">🎁 Open Your Gift!</button>
    </div>

    <div id="surprise-container">
        <img id="surprise-pic" src="your-picture.jpg" alt="Surprise Photo">
        <audio id="voice-audio" src="your-voice-note.mp3"></audio>
    </div>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let animationId;

        const startBtn = document.getElementById('start-mic-btn');
        const giftBtn = document.getElementById('gift-btn');
        const flames = document.querySelectorAll('.flame');
        const statusText = document.getElementById('status-text');
        const surpriseContainer = document.getElementById('surprise-container');
        const voiceAudio = document.getElementById('voice-audio');
        const cakeWrapper = document.getElementById('cake-wrapper');

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                microphone.connect(analyser);
                analyser.fftSize = 256;
                
                startBtn.style.display = 'none';
                statusText.innerText = "Listening... Blow into the microphone! 💨";
                
                listenForBlow();
            } catch (err) {
                alert("Please allow microphone access to blow out the candles!");
            }
        });

        function listenForBlow() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            let averageVolume = sum / bufferLength;

            if (averageVolume > 50) { 
                blowOutCandles();
            } else {
                animationId = requestAnimationFrame(listenForBlow);
            }
        }

        function blowOutCandles() {
            cancelAnimationFrame(animationId); 
            if(audioContext) audioContext.close(); 

            // Hide the code flames
            flames.forEach(flame => flame.style.display = 'none');
            
            // Optional: apply a dark filter to the cake image so the painted flames look "off"
            document.getElementById('cake-image').style.filter = "brightness(80%)";

            statusText.style.display = 'none';
            giftBtn.style.display = 'inline-block'; 
        }

        giftBtn.addEventListener('click', () => {
            giftBtn.style.display = 'none';
            cakeWrapper.style.display = 'none'; 
            surpriseContainer.style.display = 'block';
            voiceAudio.play();
        });
    </script>
</body>
</html>
